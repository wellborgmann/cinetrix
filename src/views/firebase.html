<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromecast API Tester</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind for a nice font and look -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'primary': '#4F46E5', // Indigo-600
                        'primary-dark': '#4338CA', // Indigo-700
                    }
                }
            }
        }
    </script>
    <style>
        /* Ensures body takes up full viewport height for centering */
        html, body {
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg bg-white shadow-2xl rounded-xl p-8 space-y-6 border border-gray-100">
        <h1 class="text-3xl font-extrabold text-gray-900 text-center border-b pb-4">
            Testador do Endpoint <span class="text-primary">/send</span>
        </h1>

        <form id="castForm" class="space-y-5">
            <!-- Server Base URL Input -->
            <div class="space-y-1">
                <label for="serverUrl" class="block text-sm font-medium text-gray-700">
                    URL Base do Servidor (Ex: http://localhost:3000)
                </label>
                <input type="text" id="serverUrl" value="/send" required
                       placeholder="/send"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-primary focus:border-primary transition duration-150">
            </div>

            <!-- TV ID Input -->
            <div class="space-y-1">
                <label for="tvId" class="block text-sm font-medium text-gray-700">
                    ID da TV (tvId)
                </label>
                <input type="text" id="tvId" required
                       placeholder="Ex: Sala"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-primary focus:border-primary transition duration-150">
            </div>

            <!-- Content URL Input -->
            <div class="space-y-1">
                <label for="contentUrl" class="block text-sm font-medium text-gray-700">
                    URL do Conteúdo (url)
                </label>
                <input type="url" id="contentUrl" required
                       placeholder="Ex: https://example.com/video.mp4"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-primary focus:border-primary transition duration-150">
            </div>

            <!-- Streaming Checkbox -->
            <div class="flex items-center">
                <input id="streaming" type="checkbox"
                       class="h-4 w-4 text-primary border-gray-300 rounded focus:ring-primary transition duration-150">
                <label for="streaming" class="ml-2 block text-sm font-medium text-gray-700 cursor-pointer">
                    Streaming (streaming - Valor Booleano)
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitButton"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-md text-base font-semibold text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-150 ease-in-out transform hover:scale-[1.01]">
                Enviar Comando de Cast
            </button>
        </form>

        <!-- Response Status Area -->
        <div id="responseStatus" class="mt-6 p-4 rounded-lg text-sm transition-all duration-300 min-h-[50px] flex items-center justify-center font-medium border border-gray-200 bg-gray-50">
            Aguardando envio...
        </div>
    </div>

    <script>
        const form = document.getElementById('castForm');
        const submitButton = document.getElementById('submitButton');
        const responseStatus = document.getElementById('responseStatus');

        // Utility function to update the status box style and content
        function updateStatus(message, type = 'default') {
            responseStatus.textContent = message;
            responseStatus.className = 'mt-6 p-4 rounded-lg text-sm transition-all duration-300 min-h-[50px] flex items-center justify-center font-medium';
            
            if (type === 'success') {
                responseStatus.classList.add('bg-green-100', 'border-green-400', 'text-green-800');
            } else if (type === 'error') {
                responseStatus.classList.add('bg-red-100', 'border-red-400', 'text-red-800');
            } else if (type === 'loading') {
                responseStatus.classList.add('bg-blue-100', 'border-blue-400', 'text-blue-800');
            } else { // default
                responseStatus.classList.add('bg-gray-50', 'border-gray-200', 'text-gray-700');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. Get values from form
            const serverUrl = document.getElementById('serverUrl').value.trim();
            const tvId = document.getElementById('tvId').value.trim();
            const contentUrl = document.getElementById('contentUrl').value.trim();
            const streaming = document.getElementById('streaming').checked;

            if (!serverUrl) {
                updateStatus("Erro: Por favor, insira a URL Base do Servidor.", 'error');
                return;
            }

            // 2. Construct the full endpoint URL
            const endpointUrl = `${serverUrl}`; // Ensures no double slash

            // 3. Construct the request body
            const payload = {
                tvId: tvId,
                url: contentUrl,
                streaming: streaming
            };

            updateStatus("Enviando requisição...", 'loading');
            submitButton.disabled = true;
            submitButton.textContent = "Aguarde...";

            try {
                // 4. Send the POST request
                const response = await fetch(endpointUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // 5. Handle response status
                if (response.ok) {
                    const result = await response.json();
                    updateStatus(`Sucesso! Status ${response.status}. Resposta: ${JSON.stringify(result)}`, 'success');
                } else {
                    // This handles server-side errors like 400 (Bad Request)
                    let errorText = await response.text();
                    // Fallback for empty 400 responses
                    errorText = errorText.trim() || `O servidor retornou um erro sem corpo de mensagem (Status ${response.status}).`;
                    updateStatus(`Erro na Requisição (Status ${response.status}): ${errorText}`, 'error');
                }

            } catch (error) {
                // This handles network errors, CORS issues, or server unavailability
                console.error("Erro de rede/fetch:", error);
                updateStatus(`Erro de Conexão: Não foi possível alcançar o servidor em ${endpointUrl}. Verifique o console para mais detalhes.`, 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "Enviar Comando de Cast";
            }
        });
    </script>
</body>
</html>
