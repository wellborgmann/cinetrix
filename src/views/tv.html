<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  body{
    background-color: black;
    color: white
  }
  span{
     color: white
  }
</style>
<body>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  doc,
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyTPB8AGmRblWoQmD9L238qcViJBCgKpU",
  authDomain: "m3ulogin.firebaseapp.com",
  projectId: "m3ulogin",
  storageBucket: "m3ulogin.firebasestorage.app",
  messagingSenderId: "526621746199",
  appId: "1:526621746199:web:7de447517d8feed3342852",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ------------------------
// GERAR ID (6 dígitos)
// ------------------------
function gerarCodigoTV() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, "0");
  const m = now.getMinutes().toString().padStart(2, "0");
  const s = now.getSeconds().toString().padStart(2, "0");
  return `${h}${m}${s}`;
}

// ------------------------
// ID PERSISTENTE
// ------------------------
let tvId = localStorage.getItem("tvId");

if (!tvId) {
  tvId = gerarCodigoTV();
  localStorage.setItem("tvId", tvId);
}

document.getElementById("codigo").innerText = tvId;

// ------------------------
// ESCUTAR MENSAGENS
// ------------------------
function ouvirMensagens() {
  const q = query(
    collection(db, "tvs", tvId, "mensagens"),
    orderBy("hora")
  );

  onSnapshot(q, snapshot => {
    snapshot.docChanges().forEach(change => {
      if (change.type === "added") {
        const data = change.doc.data();

        // RECEBEU O VÍDEO
        tocarVideo(data);
      }
    });
  });
}

function tocarVideo(data) {
  const player = document.getElementById("player");
  player.src = data.url;
}

ouvirMensagens();
</script>

<h1>Código da TV: <span id="codigo"></span></h1>
<video id="player" controls autoplay style="width:100%"></video>

</body>
</html>
